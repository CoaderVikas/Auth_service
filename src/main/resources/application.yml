# ================================
# SERVER CONFIG
# ================================
server:
  port: 9091

error:
  include-stacktrace: never
  include-message: always

# ================================
# SPRING CONFIG
# ================================
spring:
  profiles:
    active: local

  application:
    name: AUTH-SERVICE

  datasource:
    url: ${datasource.url}
    username: ${datasource.username}
    password: ${datasource.password}
    driver-class-name: ${datasource.driver-class-name}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 30000
      pool-name: AuthHikariCP
      connection-timeout: 10000
      initialization-fail-timeout: 0

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        boot.allow_jdbc_metadata_access: false
        default_schema: SYSTEM
        jdbc.fetch_size: 100
        transaction.jta.platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

  data:
    jpa:
      repositories:
        bootstrap-mode: deferred

    redis:   
      host: localhost
      port: 6379

  kafka:   
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  config:
    import:
      - optional:configserver:http://localhost:8452

# ================================
# LOGGING
# ================================
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} : %msg%n%wEx{1}"
  level:
    root: INFO
    org.hibernate.orm.connections.pooling: ERROR

# ================================
# ACTUATOR + PROMETHEUS
# ================================
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics

  endpoint:
    health:
      show-details: always

    prometheus:   
      access: unrestricted

  metrics:
    tags:
      application: auth-service

# ================================
# JWT CONFIG
# ================================
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  issuer: vikas-app